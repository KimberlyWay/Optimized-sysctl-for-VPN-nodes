# ====================================================================
# ОПТИМИЗИРОВАННЫЙ SYSCTL.CONF ДЛЯ VPN-НОД (VLESS / XRAY / Reality)
# ====================================================================

# --------------------------------------------------------------------
# 0. УПРАВЛЕНИЕ IPv6
# --------------------------------------------------------------------
# Чтобы ПОЛНОСТЬЮ ВЫКЛЮЧИТЬ IPv6, установи везде 1. 
# Если IPv6 НУЖЕН (для работы ноды), установи 0.
net.ipv6.conf.all.disable_ipv6 = 0
net.ipv6.conf.default.disable_ipv6 = 0
net.ipv6.conf.lo.disable_ipv6 = 0

# --------------------------------------------------------------------
# 1. МАРШРУТИЗАЦИЯ И БЕЗОПАСНОСТЬ СЕТИ (ОБЯЗАТЕЛЬНО)
# --------------------------------------------------------------------
# Разрешаем серверу пересылать транзитный трафик. Без этого VPN не работает.
net.ipv4.ip_forward = 1

# Разрешаем пересылку IPv6 (нужно, если в блоке 0 стоит "0")
net.ipv6.conf.all.forwarding = 1
net.ipv6.conf.default.forwarding = 1

# Защита от IP-спуфинга.
net.ipv4.conf.all.rp_filter = 1
net.ipv4.conf.default.rp_filter = 1

# Игнорируем широковещательные ICMP-запросы (защита от smurf-атак).
net.ipv4.icmp_echo_ignore_broadcasts = 1

# --------------------------------------------------------------------
# 2. АЛГОРИТМЫ КОНТРОЛЯ ПЕРЕГРУЗКИ (СКОРОСТЬ)
# --------------------------------------------------------------------
# Включаем BBR. Мастхэв для YouTube в 4K и быстрой загрузки файлов.
net.core.default_qdisc = fq
net.ipv4.tcp_congestion_control = bbr

# --------------------------------------------------------------------
# 3. ОТЗЫВЧИВОСТЬ И БОРЬБА С ЗАДЕРЖКАМИ (ПИНГ И СЕРФИНГ)
# --------------------------------------------------------------------
# Отключаем "медленный старт" после простоя (канал всегда на максимуме).
net.ipv4.tcp_slow_start_after_idle = 0

# ECN (Explicit Congestion Notification). Ставим 0 для стабильности.
net.ipv4.tcp_ecn = 0

# TCP Fast Open. По умолчанию 0 (безопасно для Reality).
net.ipv4.tcp_fastopen = 0

# --------------------------------------------------------------------
# 4. НАСТРОЙКА БУФЕРОВ (ДЛЯ ГИГАБИТНЫХ КАНАЛОВ)
# --------------------------------------------------------------------
net.core.rmem_max = 16777216
net.core.wmem_max = 16777216
net.ipv4.tcp_rmem = 4096 87380 16777216
net.ipv4.tcp_wmem = 4096 65536 16777216

# Размер очереди сетевого интерфейса.
net.core.netdev_max_backlog = 5000

# --------------------------------------------------------------------
# 5. УПРАВЛЕНИЕ СОЕДИНЕНИЯМИ (ДЛЯ ВЫСОКОНАГРУЖЕННЫХ НОД)
# --------------------------------------------------------------------
# Защита от SYN-флуда.
net.ipv4.tcp_syncookies = 1

# Максимальное количество соединений в очереди.
net.core.somaxconn = 4096

# Тайм-аут закрытия соединений (FIN-WAIT-2).
net.ipv4.tcp_fin_timeout = 15

# Переиспользование портов TIME_WAIT.
net.ipv4.tcp_tw_reuse = 1

# Keepalive тайминги (быстрее сбрасываем "мертвых" клиентов).
net.ipv4.tcp_keepalive_time = 600
net.ipv4.tcp_keepalive_intvl = 60
net.ipv4.tcp_keepalive_probes = 5

# --------------------------------------------------------------------
# 6. СИСТЕМНЫЕ ЛИМИТЫ (ФАЙЛОВЫЕ ДЕСКРИПТОРЫ И ПАМЯТЬ)
# --------------------------------------------------------------------
# Лимит открытых файлов (соединений).
fs.file-max = 2097152

# Сваппинг: держим всё в RAM до последнего.
vm.swappiness = 10