########################################################################
# sysctl.conf — универсальный тюнинг для сервера с remnanode / Xray
# Подходит одинаково для: VLESS+TCP+Reality, VLESS+XHTTP+Reality, TLS+Reality
# Применение:
#   cp sysctl.conf /etc/sysctl.conf
#   sysctl -p
########################################################################

### ==================== IPv6 ====================
# По умолчанию ВЫКЛЮЧЕН
# Чтобы включить IPv6 — просто замените в этом блоке все "= 1" на "= 0"
# (первые 3 строки), остальные ipv6-строки ниже — это уже security-хардентинг
# для случая, когда IPv6 всё же включён, они не мешают, если IPv6 выключен.
net.ipv6.conf.all.disable_ipv6 = 1
net.ipv6.conf.default.disable_ipv6 = 1
net.ipv6.conf.lo.disable_ipv6 = 1

# Хардентинг IPv6 на случай, если вы его включите
net.ipv6.conf.all.forwarding = 0
net.ipv6.conf.all.accept_ra = 0
net.ipv6.conf.default.accept_ra = 0
net.ipv6.conf.all.autoconf = 0
net.ipv6.conf.default.autoconf = 0
net.ipv6.conf.all.use_tempaddr = 2
net.ipv6.conf.default.use_tempaddr = 2
net.ipv6.conf.all.accept_redirects = 0
net.ipv6.conf.default.accept_redirects = 0
net.ipv6.conf.all.accept_source_route = 0
net.ipv6.conf.default.accept_source_route = 0

### ==================== IPv4 — маршрутизация и антиспуфинг ====================
net.ipv4.ip_forward = 0

net.ipv4.conf.all.send_redirects = 0
net.ipv4.conf.default.send_redirects = 0
net.ipv4.conf.all.accept_redirects = 0
net.ipv4.conf.default.accept_redirects = 0
net.ipv4.conf.all.accept_source_route = 0
net.ipv4.conf.default.accept_source_route = 0

# rp_filter=1 (strict) подходит для одного интерфейса/одного шлюза (типовой VPS).
# Если у сервера несколько сетей/маршрутов (напр. приватная сеть до
# панели remnawave, второй NIC, floating IP) — поставьте 2 (loose),
# иначе часть легитимного трафика может дропаться.
net.ipv4.conf.all.rp_filter = 1
net.ipv4.conf.default.rp_filter = 1

net.ipv4.conf.all.log_martians = 1
net.ipv4.conf.default.log_martians = 1

### ==================== ICMP ====================
net.ipv4.icmp_echo_ignore_broadcasts = 1
net.ipv4.icmp_ratelimit = 100
net.ipv4.icmp_ratemask = 88089
net.ipv4.icmp_ignore_bogus_error_responses = 1

### ==================== TCP — базовая защита ====================
net.ipv4.tcp_syncookies = 1
net.ipv4.tcp_timestamps = 1        # нужен BBR для точного измерения RTT, не отключать
net.ipv4.tcp_window_scaling = 1
net.ipv4.tcp_sack = 1

### ==================== TCP — под долгоживущие прокси-соединения ====================
# Важно для VLESS/XHTTP: соединения долгие, часто "молчат", потом резко
# получают пачку данных — не хотим, чтобы cwnd схлопывалось после простоя.
net.ipv4.tcp_slow_start_after_idle = 0

# Path MTU discovery — снижает риск "чёрных дыр" из-за блокировки ICMP или
# фрагментации на транзитных сетях (актуально при обфусцированном трафике).
net.ipv4.tcp_mtu_probing = 1

net.ipv4.tcp_fin_timeout = 25
net.ipv4.tcp_fastopen = 3
net.ipv4.tcp_tw_reuse = 1
net.ipv4.tcp_max_syn_backlog = 8192
net.ipv4.tcp_max_tw_buckets = 262144

# ECN=2: сервер включает ECN только если клиент сам его запросил.
# Безопаснее чем ECN=1 — часть сетей/DPI-фильтров искажает пакеты
# с выставленными ECN-битами, что может рвать Reality-соединения.
net.ipv4.tcp_ecn = 2

net.ipv4.tcp_keepalive_time = 600
net.ipv4.tcp_keepalive_intvl = 60
net.ipv4.tcp_keepalive_probes = 5

# Больше эфемерных портов — нода сама открывает много исходящих соединений
# (до reality-dest / fallback / upstream), особенно под нагрузкой.
net.ipv4.ip_local_port_range = 1024 65535

### ==================== TCP/core — буферы и очереди ====================
# 16MB достаточно для типового VPS-канала (до ~1 Гбит). Если канал шире
# (10G) или RTT до клиентов большой — можно поднять до 67108864 (64MB).
net.ipv4.tcp_rmem = 4096 87380 16777216
net.ipv4.tcp_wmem = 4096 65536 16777216

net.core.somaxconn = 4096
net.core.netdev_max_backlog = 5000
net.core.rmem_max = 16777216
net.core.wmem_max = 16777216

net.core.default_qdisc = fq
net.ipv4.tcp_congestion_control = bbr

### ==================== Безопасность ядра ====================
kernel.yama.ptrace_scope = 1
kernel.randomize_va_space = 2
fs.suid_dumpable = 0

### ==================== Файлы и память ====================
fs.file-max = 2097152
fs.nr_open = 2097152
vm.swappiness = 0

########################################################################
# ОПЦИОНАЛЬНО: раскомментируйте, только если на сервере реально
# используется iptables/nftables с DNAT (например, редирект 443 -> порт xray).
# Модуль nf_conntrack должен быть уже загружен, иначе sysctl -p упадёт
# на этих строках.
########################################################################
