# ====================================================================
# ОПТИМИЗИРОВАННЫЙ SYSCTL.CONF ДЛЯ VPN-НОД (VLESS / XRAY / Reality)
# ====================================================================

# --------------------------------------------------------------------
# 1. МАРШРУТИЗАЦИЯ И БЕЗОПАСНОСТЬ СЕТИ (ОБЯЗАТЕЛЬНО)
# --------------------------------------------------------------------
# Разрешаем серверу пересылать транзитный трафик. Без этого VPN не работает.
net.ipv4.ip_forward = 1
# Если используешь IPv6 на нодах (например, для обхода блокировок), раскомментируй строку ниже:
# net.ipv6.conf.all.forwarding = 1

# Защита от IP-спуфинга. Оставляем включенной, ядро проверяет обратный путь пакета.
net.ipv4.conf.all.rp_filter = 1
net.ipv4.conf.default.rp_filter = 1

# Игнорируем широковещательные ICMP-запросы (защита от smurf-атак).
net.ipv4.icmp_echo_ignore_broadcasts = 1

# --------------------------------------------------------------------
# 2. АЛГОРИТМЫ КОНТРОЛЯ ПЕРЕГРУЗКИ (СКОРОСТЬ)
# --------------------------------------------------------------------
# Включаем BBR. Это мастхэв для YouTube в 4K и быстрой загрузки файлов.
# Заменяет стандартный алгоритм cubic, который сильно режет скорость при малейших потерях пакетов.
net.core.default_qdisc = fq
net.ipv4.tcp_congestion_control = bbr

# --------------------------------------------------------------------
# 3. ОТЗЫВЧИВОСТЬ И БОРЬБА С ЗАДЕРЖКАМИ (ПИНГ И СЕРФИНГ)
# --------------------------------------------------------------------
# КРИТИЧНО ДЛЯ ВЕБ-СЕРФИНГА И ТГ: Отключаем "медленный старт" после простоя.
# По умолчанию Linux сбрасывает скорость соединения, если ты пару секунд ничего не качал.
# Значение 0 заставляет канал сразу отдавать трафик на максимуме.
net.ipv4.tcp_slow_start_after_idle = 0

# ECN (Explicit Congestion Notification). 
# СТАВИМ 0. Как мы выяснили ранее, если на пути есть старые роутеры провайдера, 
# ECN вызывает задержки по 2-5 секунд при открытии сайтов. 
net.ipv4.tcp_ecn = 0

# TCP Fast Open. 
# Теоретически ускоряет хендшейки. На практике часто конфликтует с XTLS-Reality.
# Оставляем 0. Если уверен, что все клиенты и прокси его поддерживают без глюков, можно поставить 3.
net.ipv4.tcp_fastopen = 0

# --------------------------------------------------------------------
# 4. НАСТРОЙКА БУФЕРОВ (ДЛЯ ГИГАБИТНЫХ КАНАЛОВ)
# --------------------------------------------------------------------
# Расширяем буферы под высокие скорости. Если у тебя VPS на 1 Гбит/с и выше, 
# эти значения позволят буферизовать больше данных без дропов.
net.core.rmem_max = 16777216
net.core.wmem_max = 16777216
net.ipv4.tcp_rmem = 4096 87380 16777216
net.ipv4.tcp_wmem = 4096 65536 16777216

# Размер очереди сетевого интерфейса. Спасает при микро-всплесках трафика.
net.core.netdev_max_backlog = 5000

# --------------------------------------------------------------------
# 5. УПРАВЛЕНИЕ СОЕДИНЕНИЯМИ (ДЛЯ ВЫСОКОНАГРУЖЕННЫХ НОД)
# --------------------------------------------------------------------
# Защита от SYN-флуда. Если ноду начнут DDoS-ить полуоткрытыми соединениями, ядро выстоит.
net.ipv4.tcp_syncookies = 1

# Максимальное количество соединений в очереди на прослушивание. 
# Для VLESS-сервера, где сидит много юзеров, стандартных 128 мало.
net.core.somaxconn = 4096

# Как быстро закрывать зависшие соединения (FIN-WAIT-2).
# По умолчанию 60 сек, снижаем до 15-20, чтобы освобождать память от отвалившихся клиентов.
net.ipv4.tcp_fin_timeout = 15

# Разрешаем переиспользование портов в состоянии TIME_WAIT.
# Полезно, когда через ноду идет миллион мелких запросов, чтобы не закончились свободные порты.
net.ipv4.tcp_tw_reuse = 1

# Keepalive: как часто проверять, жив ли клиент, если он молчит.
# Уменьшаем тайминги, чтобы мертвые соединения (например, телефон ушел в авиарежим) быстрее обрывались.
net.ipv4.tcp_keepalive_time = 600
net.ipv4.tcp_keepalive_intvl = 60
net.ipv4.tcp_keepalive_probes = 5

# --------------------------------------------------------------------
# 6. СИСТЕМНЫЕ ЛИМИТЫ (ФАЙЛОВЫЕ ДЕСКРИПТОРЫ И ПАМЯТЬ)
# --------------------------------------------------------------------
# Каждое сетевое соединение = открытый файл. 
# Для VPN-ноды ставим с большим запасом, чтобы не словить ошибку "Too many open files".
fs.file-max = 2097152

# Заставляем систему до последнего держать данные в быстрой RAM и не сбрасывать их в медленный SWAP.
vm.swappiness = 10
