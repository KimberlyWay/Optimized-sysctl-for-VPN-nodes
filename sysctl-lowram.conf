########################################################################
# sysctl.conf — версия для слабых VPS (0.5–2GB RAM)
# remnanode / Xray — VLESS+TCP+Reality, VLESS+XHTTP+Reality, TLS+Reality
#
# Отличие от "обычной" версии — только в потолке TCP-буферов на сокет
# (8MB вместо 16MB), это снижает риск упереться в память при нескольких
# одновременных быстрых соединениях на маленькой ноде. Остальная логика
# (BBR, MTU probing, ECN и т.д.) идентична основной версии.
#
# РЕКОМЕНДАЦИЯ для нод ≤1GB: добавьте 1-2GB swap, даже на SSD-VPS.
# Это дешёвая страховка от OOM-killer, который иначе прибьёт сам xray
# в момент пиковой нагрузки:
#   fallocate -l 2G /swapfile && chmod 600 /swapfile
#   mkswap /swapfile && swapon /swapfile
#   echo '/swapfile none swap sw 0 0' >> /etc/fstab
#
# Применение:
#   cp sysctl-lowram.conf /etc/sysctl.conf
#   sysctl -p
########################################################################

### ==================== IPv6 ====================
# По умолчанию выключен. Чтобы включить — замените "= 1" на "= 0"
# в этих трёх строках, остальной ipv6-хардентинг ниже не мешает в любом случае.
net.ipv6.conf.all.disable_ipv6 = 1
net.ipv6.conf.default.disable_ipv6 = 1
net.ipv6.conf.lo.disable_ipv6 = 1

net.ipv6.conf.all.forwarding = 0
net.ipv6.conf.all.accept_ra = 0
net.ipv6.conf.default.accept_ra = 0
net.ipv6.conf.all.autoconf = 0
net.ipv6.conf.default.autoconf = 0
net.ipv6.conf.all.use_tempaddr = 2
net.ipv6.conf.default.use_tempaddr = 2
net.ipv6.conf.all.accept_redirects = 0
net.ipv6.conf.default.accept_redirects = 0
net.ipv6.conf.all.accept_source_route = 0
net.ipv6.conf.default.accept_source_route = 0

### ==================== IPv4 — маршрутизация и антиспуфинг ====================
net.ipv4.ip_forward = 0

net.ipv4.conf.all.send_redirects = 0
net.ipv4.conf.default.send_redirects = 0
net.ipv4.conf.all.accept_redirects = 0
net.ipv4.conf.default.accept_redirects = 0
net.ipv4.conf.all.accept_source_route = 0
net.ipv4.conf.default.accept_source_route = 0

# Если у ноды один интерфейс/один шлюз (типовой случай) — оставить 1.
# Если несколько сетей/маршрутов — поставить 2.
net.ipv4.conf.all.rp_filter = 1
net.ipv4.conf.default.rp_filter = 1

net.ipv4.conf.all.log_martians = 1
net.ipv4.conf.default.log_martians = 1

### ==================== ICMP ====================
net.ipv4.icmp_echo_ignore_broadcasts = 1
net.ipv4.icmp_ratelimit = 100
net.ipv4.icmp_ratemask = 88089
net.ipv4.icmp_ignore_bogus_error_responses = 1

### ==================== TCP — базовая защита ====================
net.ipv4.tcp_syncookies = 1
net.ipv4.tcp_timestamps = 1
net.ipv4.tcp_window_scaling = 1
net.ipv4.tcp_sack = 1

### ==================== TCP — под долгоживущие прокси-соединения ====================
net.ipv4.tcp_slow_start_after_idle = 0
net.ipv4.tcp_mtu_probing = 1

net.ipv4.tcp_fin_timeout = 25
net.ipv4.tcp_fastopen = 3
net.ipv4.tcp_tw_reuse = 1
net.ipv4.tcp_max_syn_backlog = 4096
net.ipv4.tcp_max_tw_buckets = 131072

net.ipv4.tcp_ecn = 2

net.ipv4.tcp_keepalive_time = 600
net.ipv4.tcp_keepalive_intvl = 60
net.ipv4.tcp_keepalive_probes = 5

net.ipv4.ip_local_port_range = 1024 65535

### ==================== TCP/core — буферы и очереди (урезано под мало RAM) ====================
# Потолок буфера на сокет снижен до 8MB (было 16MB) — главное отличие
# от основной версии. Автотюнинг ядра всё так же начинает с малых
# значений (87380/65536) и растёт только по факту нагрузки.
net.ipv4.tcp_rmem = 4096 87380 8388608
net.ipv4.tcp_wmem = 4096 65536 8388608

net.core.somaxconn = 2048
net.core.netdev_max_backlog = 2500
net.core.rmem_max = 8388608
net.core.wmem_max = 8388608

net.core.default_qdisc = fq
net.ipv4.tcp_congestion_control = bbr

### ==================== Безопасность ядра ====================
kernel.yama.ptrace_scope = 1
kernel.randomize_va_space = 2
fs.suid_dumpable = 0

### ==================== Файлы и память ====================
fs.file-max = 524288
fs.nr_open = 524288

# 10 вместо 0 — на ноде с малым RAM лучше позволить ядру немного
# использовать swap (если он есть, см. рекомендацию выше), чем полностью
# запрещать это и получить OOM-killer вместо лёгкого свопа.
vm.swappiness = 10
